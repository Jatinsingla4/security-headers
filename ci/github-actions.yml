# .github/workflows/security-check.yml
# CI/CD pipeline: broken link detection + type checking + deploy
name: Security & Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run broken link scan weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"

env:
  NODE_VERSION: "20"

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - run: npm run typecheck

  link-check:
    name: Broken Link Detection
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci

      # Run crawler in CI mode — exits non-zero if broken links found
      - name: Crawl for broken links
        run: npm run crawl:ci -- --url ${{ vars.SITE_URL || 'https://securityheaders.com' }} --depth 3
        continue-on-error: false

      # Upload report as artifact
      - name: Upload crawl report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: crawl-report
          path: reports/crawl-report.json
          retention-days: 30

  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    needs: [typecheck, link-check]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
      - run: npm ci
      - name: Deploy to Cloudflare
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
