name = "security-headers-worker"
main = "backend/index.ts"
compatibility_date = "2024-11-01"

[vars]
ENVIRONMENT = "production"
ALLOWED_ORIGINS = "https://securityheaders.com,https://app.securityheaders.com"
RATE_LIMIT_MAX = "100"
RATE_LIMIT_WINDOW_MS = "60000"

[[d1_databases]]
binding = "DB"
database_name = "security-headers-db"
database_id = "your-d1-database-id"

[[r2_buckets]]
binding = "R2"
bucket_name = "security-headers-uploads"

[[vectorize]]
binding = "VECTORIZE"
index_name = "security-headers-vectors"

[durable_objects]
bindings = [
  { name = "WEBSOCKET_ROOM", class_name = "WebSocketRoom" },
  { name = "RATE_LIMITER", class_name = "RateLimiterDO" }
]

[[migrations]]
tag = "v1"
new_classes = ["WebSocketRoom", "RateLimiterDO"]
